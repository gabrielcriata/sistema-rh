<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH - Registro de Documentos</title>
    <style>
        /* Estilo Universal Dark Mode */
        :root {
            --bg-body: #0d0e15; --bg-card: #151623; --text-main: #ffffff;
            --text-muted: #8b8d9b; --accent-purple: #8a2be2; --accent-green: #2ecc71;
            --accent-red: #ff4757; --border-color: #232533;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-body); color: var(--text-main); padding: 20px; margin: 0; }
        .container { background-color: var(--bg-card); padding: 30px; border-radius: 12px; border: 1px solid var(--border-color); max-width: 900px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--text-main); border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-top: 0; font-weight: 600; }
        h3 { color: var(--text-main); margin-top: 25px; font-weight: 500; font-size: 16px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: 1 / -1; }
        label { font-size: 12px; color: var(--text-muted); font-weight: bold; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;}
        input, select { width: 100%; padding: 12px; background: #0a0b10; border: 1px solid var(--border-color); color: var(--text-main); border-radius: 8px; box-sizing: border-box; font-size: 14px; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--accent-purple); outline: none; box-shadow: 0 0 0 2px rgba(138, 43, 226, 0.2); }
        button, .btn-salvar { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; color: #fff; font-size: 14px; background-color: var(--accent-purple); width: 100%; margin-top: 10px;}
        button:hover, .btn-salvar:hover { background-color: #7122b8; transform: translateY(-1px); }
        .btn-excluir { background-color: transparent; border: 1px solid var(--accent-red); color: var(--accent-red); padding: 6px 12px; font-size: 12px; width: auto; margin-top: 0;}
        .btn-excluir:hover { background: rgba(255, 71, 87, 0.1); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 15px; font-size: 14px; border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background-color: rgba(255,255,255,0.02); color: var(--text-muted); text-transform: uppercase; font-size: 11px; font-weight: bold; letter-spacing: 1px; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: rgba(255,255,255,0.02); }
        .badge { background: rgba(46, 204, 113, 0.1); color: var(--accent-green); padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid rgba(46, 204, 113, 0.2); }
    </style>
</head>
<body>

<div class="container">
    <h2>Registro de Entrega de Documentos</h2>
    
    <div class="form-grid">
        <div class="form-group full-width">
            <label>Funcionário:</label>
            <select id="selectFuncionario">
                <option value="">Selecione um funcionário...</option>
            </select>
        </div>
        <div class="form-group">
            <label>Tipo / Nome do Documento:</label>
            <input type="text" id="nomeDoc" placeholder="Ex: Termo de Confidencialidade, EPI - Bota...">
        </div>
        <div class="form-group">
            <label>Data da Entrega / Assinatura:</label>
            <input type="date" id="dataDoc">
        </div>
    </div>

    <button class="btn-salvar" onclick="registrarDocumento()">Registrar no Log</button>

    <h3>Log de Documentos Entregues</h3>
    <table>
        <thead>
            <tr>
                <th>Data</th>
                <th>Funcionário</th>
                <th>Documento</th>
                <th>Status</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="listaDocumentos">
            </tbody>
    </table>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        carregarDropdown();
        renderizarLogs();
        
        // Preenche o campo de data com a data de hoje por padrão
        document.getElementById('dataDoc').valueAsDate = new Date();
    });

    function carregarDropdown() {
        const funcionarios = JSON.parse(localStorage.getItem('rhFuncionarios')) || [];
        const select = document.getElementById('selectFuncionario');
        
        funcionarios.forEach(f => {
            let option = document.createElement('option');
            option.value = f.id;
            option.textContent = f.nome;
            select.appendChild(option);
        });
    }

    function registrarDocumento() {
        const funcId = document.getElementById('selectFuncionario').value;
        const funcNome = document.getElementById('selectFuncionario').options[document.getElementById('selectFuncionario').selectedIndex].text;
        const nomeDoc = document.getElementById('nomeDoc').value;
        const dataDoc = document.getElementById('dataDoc').value;

        if (!funcId || !nomeDoc || !dataDoc) {
            alert("Preencha todos os campos para registrar o documento!");
            return;
        }

        const log = {
            id: Date.now(),
            funcId,
            funcNome,
            nomeDoc,
            dataDoc,
            dataRegistro: new Date().toISOString()
        };

        let documentos = JSON.parse(localStorage.getItem('rhDocumentos')) || [];
        documentos.unshift(log); // Adiciona no início da lista
        
        localStorage.setItem('rhDocumentos', JSON.stringify(documentos));
        
        document.getElementById('nomeDoc').value = '';
        renderizarLogs();
    }

    function renderizarLogs() {
        const tbody = document.getElementById('listaDocumentos');
        tbody.innerHTML = '';
        const documentos = JSON.parse(localStorage.getItem('rhDocumentos')) || [];

        documentos.forEach(doc => {
            const dataFormatada = doc.dataDoc.split('-').reverse().join('/');
            
            tbody.innerHTML += `
                <tr>
                    <td>${dataFormatada}</td>
                    <td><strong>${doc.funcNome}</strong></td>
                    <td>${doc.nomeDoc}</td>
                    <td><span class="badge">ENTREGUE</span></td>
                    <td>
                        <button class="btn-excluir" onclick="excluirLog(${doc.id})">Excluir</button>
                    </td>
                </tr>
            `;
        });
    }

    function excluirLog(id) {
        if (confirm("Tem certeza que deseja apagar este registro do log?")) {
            let documentos = JSON.parse(localStorage.getItem('rhDocumentos')) || [];
            documentos = documentos.filter(doc => doc.id !== id);
            localStorage.setItem('rhDocumentos', JSON.stringify(documentos));
            renderizarLogs();
        }
    }
</script>

</body>
</html>
