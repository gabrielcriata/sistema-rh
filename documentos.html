<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH - Documentos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #09090b; --bg-card: #18181b; --border-color: #27272a;
            --text-main: #f4f4f5; --text-muted: #a1a1aa;
            --accent-purple: #8b5cf6; --accent-green: #10b981; --accent-red: #ef4444;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); padding: 24px; margin: 0; -webkit-font-smoothing: antialiased; }
        .container { background-color: var(--bg-card); padding: 32px; border-radius: 16px; border: 1px solid var(--border-color); max-width: 900px; margin: auto; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { color: var(--text-main); border-bottom: 1px solid var(--border-color); padding-bottom: 16px; margin-top: 0; font-weight: 600; font-size: 20px;}
        h3 { color: var(--text-main); margin-top: 32px; font-weight: 600; font-size: 16px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: 1 / -1; }
        
        label { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;}
        input, select { width: 100%; padding: 12px; background: #09090b; border: 1px solid var(--border-color); color: var(--text-main); border-radius: 8px; box-sizing: border-box; font-size: 14px; font-family: 'Inter', sans-serif; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--accent-purple); outline: none; box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2); }
        
        .btn-salvar { padding: 12px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; color: #fff; font-size: 14px; background-color: var(--accent-purple); width: 100%; margin-top: 8px; font-family: 'Inter', sans-serif;}
        .btn-salvar:hover { background-color: #7c3aed; transform: translateY(-1px); }
        .btn-excluir { background-color: transparent; border: 1px solid var(--accent-red); color: var(--accent-red); padding: 6px 12px; font-size: 12px; width: auto; cursor: pointer; border-radius: 6px; }
        .btn-excluir:hover { background: rgba(239, 68, 68, 0.1); }

        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 16px; font-size: 13px; border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
        th, td { padding: 16px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background-color: rgba(255,255,255,0.02); color: var(--text-muted); text-transform: uppercase; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: rgba(255,255,255,0.02); }
        
        .badge { background: rgba(16, 185, 129, 0.1); color: var(--accent-green); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; border: 1px solid rgba(16, 185, 129, 0.2); }
        .msg-sucesso { display: none; background-color: rgba(16, 185, 129, 0.1); color: var(--accent-green); border: 1px solid rgba(16, 185, 129, 0.2); padding: 16px; border-radius: 8px; text-align: center; margin-bottom: 24px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <h2>Registro de Documentos e EPIs</h2>
    
    <div id="msgSucesso" class="msg-sucesso"></div>
    
    <div class="form-grid">
        <div class="form-group full-width">
            <label>Funcionário:</label>
            <select id="selectFuncionario">
                <option value="">Selecione um funcionário...</option>
            </select>
        </div>
        <div class="form-group">
            <label>Documento / Equipamento:</label>
            <input type="text" id="nomeDoc" placeholder="Ex: Termo de Confidencialidade, EPI...">
        </div>
        <div class="form-group">
            <label>Data da Entrega:</label>
            <input type="date" id="dataDoc">
        </div>
    </div>

    <button class="btn-salvar" onclick="registrarDocumento()">Registrar no Log</button>

    <h3>Log de Entrega</h3>
    <table>
        <thead>
            <tr>
                <th>Data</th>
                <th>Funcionário</th>
                <th>Documento</th>
                <th>Status</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="listaDocumentos"></tbody>
    </table>
</div>

<script src="script.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        carregarDropdown();
        renderizarLogs();
        document.getElementById('dataDoc').valueAsDate = new Date();
    });

    function carregarDropdown() {
        const funcionarios = JSON.parse(localStorage.getItem('rhFuncionarios')) || [];
        const select = document.getElementById('selectFuncionario');
        // Limpa o select antes de carregar (exceto a primeira opção)
        select.innerHTML = '<option value="">Selecione um funcionário...</option>';
        
        funcionarios.forEach(f => {
            let option = document.createElement('option');
            option.value = f.id; 
            option.textContent = f.nome;
            select.appendChild(option);
        });
    }

    async function registrarDocumento() {
        const select = document.getElementById('selectFuncionario');
        const funcId = select.value;
        const funcNome = select.options[select.selectedIndex].text;
        const nomeDoc = document.getElementById('nomeDoc').value.trim();
        const dataDoc = document.getElementById('dataDoc').value;

        if (!funcId || !nomeDoc || !dataDoc) { 
            alert("Por favor, preencha todos os campos!"); 
            return; 
        }

        const log = { 
            id: Date.now(), 
            funcId, 
            funcNome, 
            nomeDoc, 
            dataDoc, 
            dataRegistro: new Date().toISOString() 
        };

        let documentos = JSON.parse(localStorage.getItem('rhDocumentos')) || [];
        documentos.unshift(log);
        localStorage.setItem('rhDocumentos', JSON.stringify(documentos));
        
        // SINCRONIZAÇÃO COM O ESPELHO DE SEGURANÇA
        if (window.MirrorDB) {
            await MirrorDB.salvarAutomatico();
        }
        
        // Notificação usando o padrão do script.js
        if (window.notificar) {
            notificar("Documento registrado com sucesso!");
        }

        document.getElementById('nomeDoc').value = '';
        renderizarLogs();
    }

    function renderizarLogs() {
        const tbody = document.getElementById('listaDocumentos');
        tbody.innerHTML = '';
        const documentos = JSON.parse(localStorage.getItem('rhDocumentos')) || [];

        if (documentos.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:var(--text-muted);">Nenhum documento registrado.</td></tr>';
            return;
        }

        documentos.forEach(doc => {
            const dataFormatada = doc.dataDoc.split('-').reverse().join('/');
            tbody.innerHTML += `
                <tr>
                    <td>${dataFormatada}</td>
                    <td><strong>${doc.funcNome}</strong></td>
                    <td>${doc.nomeDoc}</td>
                    <td><span class="badge">ENTREGUE</span></td>
                    <td><button class="btn-excluir" onclick="excluirLog(${doc.id})">Excluir</button></td>
                </tr>
            `;
        });
    }

    async function excluirLog(id) {
        if (confirm("Deseja remover este registro de entrega permanentemente?")) {
            let documentos = JSON.parse(localStorage.getItem('rhDocumentos')) || [];
            documentos = documentos.filter(doc => doc.id !== id);
            localStorage.setItem('rhDocumentos', JSON.stringify(documentos));
            
            // SINCRONIZAÇÃO APÓS EXCLUSÃO
            if (window.MirrorDB) {
                await MirrorDB.salvarAutomatico();
            }

            if (window.notificar) {
                notificar("Registro removido.");
            }

            renderizarLogs();
        }
    }
</script>
</body>
</html>
