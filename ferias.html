<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH - Férias e Faltas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #09090b; --bg-card: #18181b; --border-color: #27272a;
            --text-main: #f4f4f5; --text-muted: #a1a1aa;
            --accent-purple: #8b5cf6; --accent-green: #10b981; 
            --accent-red: #ef4444; --accent-orange: #f59e0b;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); padding: 24px; margin: 0; -webkit-font-smoothing: antialiased; }
        .container { background-color: var(--bg-card); padding: 32px; border-radius: 16px; border: 1px solid var(--border-color); max-width: 900px; margin: auto; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { color: var(--text-main); border-bottom: 1px solid var(--border-color); padding-bottom: 16px; margin-top: 0; font-weight: 600; font-size: 20px;}
        h3 { color: var(--text-main); margin-top: 32px; font-weight: 600; font-size: 16px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: 1 / -1; }
        
        label { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;}
        input, select { width: 100%; padding: 12px; background: #09090b; border: 1px solid var(--border-color); color: var(--text-main); border-radius: 8px; box-sizing: border-box; font-size: 14px; font-family: 'Inter', sans-serif; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--accent-purple); outline: none; box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2); }
        
        button, .btn-salvar { padding: 12px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; color: #fff; font-size: 14px; background-color: var(--accent-purple); width: 100%; margin-top: 8px; font-family: 'Inter', sans-serif;}
        button:hover, .btn-salvar:hover { background-color: #7c3aed; transform: translateY(-1px); }
        .btn-excluir { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-muted); padding: 4px 8px; font-size: 11px; margin-left: 10px; border-radius: 4px; transition: 0.2s;}
        .btn-excluir:hover { border-color: var(--accent-red); color: var(--accent-red); background: rgba(239, 68, 68, 0.1); }

        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 16px; font-size: 13px; border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
        th, td { padding: 16px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background-color: rgba(255,255,255,0.02); color: var(--text-muted); text-transform: uppercase; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: rgba(255,255,255,0.02); }
        
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; border: 1px solid; }
        .badge.green { background: rgba(16, 185, 129, 0.1); color: var(--accent-green); border-color: rgba(16, 185, 129, 0.2); }
        .badge.orange { background: rgba(245, 158, 11, 0.1); color: var(--accent-orange); border-color: rgba(245, 158, 11, 0.2); }
        .badge.red { background: rgba(239, 68, 68, 0.1); color: var(--accent-red); border-color: rgba(239, 68, 68, 0.2); }
        
        .lista-faltas { font-size: 12px; color: var(--text-muted); margin-top: 8px; display: flex; flex-direction: column; gap: 4px;}
        .falta-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.02); padding: 4px 8px; border-radius: 4px;}
    </style>
</head>
<body>

<div class="container">
    <h2>Controle de Férias e Faltas</h2>
    
    <div class="form-grid">
        <div class="form-group full-width">
            <label>Lançar Falta Injustificada para:</label>
            <select id="selectFuncionario">
                <option value="">Selecione um funcionário...</option>
            </select>
        </div>
        <div class="form-group">
            <label>Data da Falta:</label>
            <input type="date" id="dataFalta">
        </div>
        <div class="form-group">
            <label>Motivo / Observação:</label>
            <input type="text" id="motivoFalta" placeholder="Ex: Não compareceu, sem atestado">
        </div>
    </div>

    <button class="btn-salvar" onclick="registrarFalta()">Registrar Falta</button>

    <h3>Painel de Férias (Estimativa CLT)</h3>
    <table>
        <thead>
            <tr>
                <th>Funcionário</th>
                <th>Período Aquisitivo</th>
                <th>Histórico de Faltas</th>
                <th>Direito Estimado</th>
            </tr>
        </thead>
        <tbody id="painelFerias"></tbody>
    </table>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        carregarDropdown();
        renderizarPainel();
    });

    function carregarDropdown() {
        const funcionarios = JSON.parse(localStorage.getItem('rhFuncionarios')) || [];
        const select = document.getElementById('selectFuncionario');
        funcionarios.forEach(f => {
            let option = document.createElement('option');
            option.value = f.id; option.textContent = f.nome;
            select.appendChild(option);
        });
    }

    function registrarFalta() {
        const funcId = document.getElementById('selectFuncionario').value;
        const dataFalta = document.getElementById('dataFalta').value;
        const motivo = document.getElementById('motivoFalta').value || "Não justificada";

        if (!funcId || !dataFalta) { alert("Selecione o funcionário e a data da falta!"); return; }

        const falta = { id: Date.now(), funcId, dataFalta, motivo };
        let faltas = JSON.parse(localStorage.getItem('rhFaltas')) || [];
        faltas.push(falta);
        localStorage.setItem('rhFaltas', JSON.stringify(faltas));
        
        document.getElementById('dataFalta').value = '';
        document.getElementById('motivoFalta').value = '';
        renderizarPainel();
    }

    function excluirFalta(id) {
        if(confirm("Remover esta falta?")) {
            let faltas = JSON.parse(localStorage.getItem('rhFaltas')) || [];
            faltas = faltas.filter(f => f.id !== id);
            localStorage.setItem('rhFaltas', JSON.stringify(faltas));
            renderizarPainel();
        }
    }

    function renderizarPainel() {
        const tbody = document.getElementById('painelFerias');
        tbody.innerHTML = '';
        
        const funcionarios = JSON.parse(localStorage.getItem('rhFuncionarios')) || [];
        const todasFaltas = JSON.parse(localStorage.getItem('rhFaltas')) || [];
        const hoje = new Date(); 

        funcionarios.forEach(f => {
            const faltasFuncionario = todasFaltas.filter(falta => falta.funcId == f.id);
            const numFaltas = faltasFuncionario.length;
            
            let mesesTrabalhados = 0;
            if (f.admissao) {
                const dataAdmissao = new Date(f.admissao);
                mesesTrabalhados = Math.floor(Math.abs(hoje - dataAdmissao) / (1000 * 60 * 60 * 24 * 30.44));
            }

            let diasBase = mesesTrabalhados >= 12 ? 30 : Math.floor(mesesTrabalhados * 2.5);
            let diasFerias = diasBase;
            
            if (mesesTrabalhados >= 12) {
                if (numFaltas >= 6 && numFaltas <= 14) diasFerias = 24;
                else if (numFaltas >= 15 && numFaltas <= 23) diasFerias = 18;
                else if (numFaltas >= 24 && numFaltas <= 32) diasFerias = 12;
                else if (numFaltas > 32) diasFerias = 0;
            } else {
                if (numFaltas > 5) diasFerias = Math.max(0, diasFerias - (numFaltas - 5)); 
            }

            let badgeClass = "green";
            if (mesesTrabalhados >= 22) badgeClass = "red"; 
            else if (mesesTrabalhados >= 12) badgeClass = "orange"; 

            let listaFaltasHTML = '';
            faltasFuncionario.forEach(falta => {
                const dataF = falta.dataFalta.split('-').reverse().join('/');
                listaFaltasHTML += `<div class="falta-item"><span>${dataF} (${falta.motivo})</span> <button class="btn-excluir" onclick="excluirFalta(${falta.id})">x</button></div>`;
            });

            tbody.innerHTML += `
                <tr>
                    <td><strong>${f.nome}</strong></td>
                    <td>
                        <div style="margin-bottom: 6px;">${mesesTrabalhados} meses na empresa</div>
                        <span class="badge ${badgeClass}">
                            ${mesesTrabalhados >= 22 ? 'VENCENDO / MULTA!' : (mesesTrabalhados >= 12 ? 'DIREITO ADQUIRIDO' : 'EM AQUISIÇÃO')}
                        </span>
                    </td>
                    <td>
                        <span style="color: ${numFaltas > 5 ? 'var(--accent-red)' : 'var(--text-main)'}; font-weight: 600;">
                            ${numFaltas} falta(s) registrada(s)
                        </span>
                        <div class="lista-faltas">${listaFaltasHTML}</div>
                    </td>
                    <td><strong style="font-size: 18px; color: var(--accent-purple);">${diasFerias} dias</strong></td>
                </tr>
            `;
        });
    }
</script>
</body>
</html>
