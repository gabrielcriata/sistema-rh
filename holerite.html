<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH - Gerador de Holerite</title>
    <style>
        :root {
    --bg-body: #0d0e15;
    --bg-card: #151623;
    --text-main: #ffffff;
    --text-muted: #8b8d9b;
    --accent-purple: #8a2be2;
    --accent-green: #2ecc71;
    --accent-red: #ff4757;
    --border-color: #232533;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: var(--bg-body); /* Fundo igual ao do painel */
    color: var(--text-main);
    padding: 20px;
    margin: 0;
}

/* Container Principal (Cards) */
.container, .card {
    background-color: var(--bg-card);
    padding: 30px;
    border-radius: 12px;
    border: 1px solid var(--border-color);
    max-width: 900px;
    margin: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h2 { color: var(--text-main); border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-top: 0; font-weight: 600; }
h3 { color: var(--text-main); margin-top: 25px; font-weight: 500; font-size: 16px; }

/* Formulários e Inputs */
.form-grid, .grid-geral, .controles { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
.form-group { display: flex; flex-direction: column; }
.form-group.full-width { grid-column: 1 / -1; }

.controles { display: flex; gap: 10px; } /* Especial para tela de holerite */
.controles select { flex-grow: 1; }

label { font-size: 12px; color: var(--text-muted); font-weight: bold; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;}

input, select {
    width: 100%; padding: 12px; background: #0a0b10;
    border: 1px solid var(--border-color); color: var(--text-main);
    border-radius: 8px; box-sizing: border-box; font-size: 14px; transition: 0.3s;
}

input:focus, select:focus { border-color: var(--accent-purple); outline: none; box-shadow: 0 0 0 2px rgba(138, 43, 226, 0.2); }
input.tabela-input { text-align: center; padding: 8px; }

/* Botões */
button, .btn-salvar, .btn-acao {
    padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; color: #fff; font-size: 14px;
}
.btn-salvar, button { background-color: var(--accent-purple); width: 100%; margin-top: 10px;}
.btn-salvar:hover, button:hover { background-color: #7122b8; transform: translateY(-1px); }

.btn-editar { background-color: transparent; border: 1px solid var(--accent-purple); color: var(--accent-purple); padding: 6px 12px; font-size: 12px; }
.btn-editar:hover { background: rgba(138, 43, 226, 0.1); }
.btn-excluir { background-color: transparent; border: 1px solid var(--accent-red); color: var(--accent-red); padding: 6px 12px; font-size: 12px; }
.btn-excluir:hover { background: rgba(255, 71, 87, 0.1); }

/* Tabelas (Quadro de Funcionários e Configurações) */
table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 15px; font-size: 14px; border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; }
th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border-color); }
th { background-color: rgba(255,255,255,0.02); color: var(--text-muted); text-transform: uppercase; font-size: 11px; font-weight: bold; letter-spacing: 1px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background-color: rgba(255,255,255,0.02); }

/* Mensagens de Sucesso */
.msg-sucesso, .mensagem { background-color: rgba(46, 204, 113, 0.1); color: var(--accent-green); border: 1px solid rgba(46, 204, 113, 0.2); padding: 12px; border-radius: 8px; text-align: center; margin-top: 20px; font-weight: bold; }

/* Especial: Holerite Visual (Folha de Papel) */
.holerite-box { background: #fff; color: #111; border-radius: 4px; padding: 30px; margin-top: 30px; display: none; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
.holerite-box h3 { color: #111; border-bottom: 2px solid #111; margin-top: 0; text-align: center;}
.holerite-box table { border: 2px solid #111; border-radius: 0; }
.holerite-box th { background-color: #f0f0f0; color: #111; border: 1px solid #111; text-align: center; }
.holerite-box td { border: 1px solid #111; padding: 8px; text-align: right; color: #111;}
.holerite-box td:nth-child(1) { text-align: left; }
.totais { display: flex; justify-content: space-between; font-weight: bold; font-size: 16px; margin-top: 10px; border-top: 2px solid #111; padding-top: 10px; }
.valor-liquido { color: #27ae60; font-size: 18px; }

/* Impressão */
@media print {
    body { background: white; padding: 0; }
    .controles, h2, .container { box-shadow: none; padding: 0; background: transparent; border: none;}
    .holerite-box { display: block; border: none; box-shadow: none; padding: 0; margin: 0; }
    h2, .controles { display: none; }
}
    </style>
</head>
<body>

<div class="container">
    <h2>Geração de Holerite</h2>
    
    <div class="controles">
        <select id="selectFuncionario">
            <option value="">Selecione um funcionário...</option>
        </select>
        <button onclick="gerarHolerite()">Calcular e Gerar</button>
        <button onclick="window.print()" style="background-color: #7f8c8d;">Imprimir PDF</button>
    </div>

    <div id="holeritePronto" class="holerite-box">
        <div class="cabecalho-holerite">
            <h3>RECIBO DE PAGAMENTO DE SALÁRIO</h3>
            <p>Mês de Referência: <span id="hMesAno"></span></p>
        </div>
        
        <div class="dados-funcionario">
            <strong>Nome:</strong> <span id="hNome"></span> <br>
            <strong>Cargo:</strong> <span id="hCargo"></span> | <strong>CPF:</strong> <span id="hCpf"></span><br>
            <strong>Dependentes IRRF:</strong> <span id="hDep"></span>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Descrição</th>
                    <th>Referência / Alíquota</th>
                    <th>Proventos (R$)</th>
                    <th>Descontos (R$)</th>
                </tr>
            </thead>
            <tbody id="hItens">
                </tbody>
        </table>

        <div class="totais">
            <div>Total de Vencimentos: R$ <span id="hTotalProv">0,00</span></div>
            <div>Total de Descontos: R$ <span id="hTotalDesc">0,00</span></div>
        </div>
        <div class="totais">
            <div></div>
            <div class="valor-liquido">Líquido a Receber: R$ <span id="hLiquido">0,00</span></div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", carregarDropdown);

    function carregarDropdown() {
        const funcionarios = JSON.parse(localStorage.getItem('rhFuncionarios')) || [];
        const select = document.getElementById('selectFuncionario');
        
        funcionarios.forEach(f => {
            let option = document.createElement('option');
            option.value = f.id;
            option.textContent = `${f.nome} - R$ ${f.salario.toFixed(2).replace('.', ',')}`;
            select.appendChild(option);
        });

        // Preenche o mês atual no cabeçalho
        const dataAtual = new Date();
        document.getElementById('hMesAno').textContent = `${dataAtual.getMonth() + 1}/${dataAtual.getFullYear()}`;
    }

    function calcularINSS(salarioBruto, config) {
        // Cálculo simplificado de teto para demonstração. 
        // Num sistema real completo, você faria o cálculo progressivo faixa a faixa.
        let desconto = 0;
        let aliquota = 0;

        if (salarioBruto <= config.inss.teto1) { aliquota = 7.5; }
        else if (salarioBruto <= config.inss.teto2) { aliquota = 9.0; }
        else if (salarioBruto <= config.inss.teto3) { aliquota = 12.0; }
        else { aliquota = 14.0; }

        // Se passar do teto máximo, trava o desconto no limite
        if (salarioBruto > config.inss.teto4) {
            desconto = config.inss.teto4 * (14 / 100); // Simplificação de teto
            aliquota = "Teto Máximo";
        } else {
            desconto = salarioBruto * (aliquota / 100);
            aliquota = aliquota + "%";
        }
        return { valor: desconto, ref: aliquota };
    }

    function calcularIRRF(salarioBruto, descontoINSS, dependentes, config) {
        // 1. Cálculo da Base e enquadramento na tabela tradicional progressiva
        const baseCalculo = salarioBruto - descontoINSS - (dependentes * config.geral.deducaoDependente);
        let irNormal = 0;
        let aliquota = 0;
        let deducao = 0;

        if (baseCalculo <= config.irrf.teto1) { aliquota = 0; deducao = 0; }
        else if (baseCalculo <= config.irrf.teto2) { aliquota = 7.5; deducao = config.irrf.ded2; }
        else if (baseCalculo <= config.irrf.teto3) { aliquota = 15.0; deducao = config.irrf.ded3; }
        else if (baseCalculo <= config.irrf.teto4) { aliquota = 22.5; deducao = config.irrf.ded4; }
        else { aliquota = 27.5; deducao = config.irrf.ded5; }

        if (aliquota > 0) {
            irNormal = (baseCalculo * (aliquota / 100)) - deducao;
        }

        // O imposto normal não pode ser negativo
        if (irNormal < 0) irNormal = 0;

        // 2. Aplicação da nova Regra de Isenção/Redução de 2026
        let irrfFinal = irNormal;
        let obsRef = aliquota + "%"; // Texto de referência que aparecerá no holerite

        // Trava exata da isenção: Até R$ 5.000,00 redondos
        if (salarioBruto <= 5000.00) {
            irrfFinal = 0;
            obsRef = "Isento (Regra 2026)";
        } 
        // Faixa de redução decrescente: Inicia estritamente em R$ 5.000,01
        else if (salarioBruto >= 5000.01 && salarioBruto <= 7350.00) {
            // Aplica a fórmula oficial do governo
            const valorReducao = 978.62 - (0.133145 * salarioBruto);
            irrfFinal = irNormal - valorReducao;
            
            // Garante que a redução não deixe o imposto final negativo
            if (irrfFinal < 0) irrfFinal = 0;
            
            obsRef = aliquota + "% (Reduzido)";
        }
        // Para salários a partir de R$ 7.350,01, o if é ignorado e o irrfFinal cobra o imposto normal (irNormal).

        return { valor: irrfFinal, ref: obsRef };
    } // A CHAVE EXTRA QUE ESTAVA AQUI FOI REMOVIDA

    function gerarHolerite() {
        const idSelecionado = document.getElementById('selectFuncionario').value;
        if (!idSelecionado) { alert("Selecione um funcionário primeiro."); return; }

        const funcionarios = JSON.parse(localStorage.getItem('rhFuncionarios')) || [];
        const configFiscais = JSON.parse(localStorage.getItem('rhTabelasFiscais'));

        if (!configFiscais) {
            alert("Aviso: Você precisa salvar as Tabelas Fiscais primeiro no módulo de Configurações!");
            return;
        }

        const func = funcionarios.find(f => f.id == idSelecionado);
        const salario = func.salario;

        // Executa os cálculos
        const inss = calcularINSS(salario, configFiscais);
        const irrf = calcularIRRF(salario, inss.valor, func.dependentes, configFiscais);

        const totalProventos = salario;
        const totalDescontos = inss.valor + irrf.valor;
        const liquido = totalProventos - totalDescontos;

        // Preenche a tela
        document.getElementById('hNome').textContent = func.nome;
        document.getElementById('hCargo').textContent = func.cargo;
        document.getElementById('hCpf').textContent = func.cpf || "Não informado";
        document.getElementById('hDep').textContent = func.dependentes;

        const tbody = document.getElementById('hItens');
        tbody.innerHTML = `
            <tr>
                <td>Salário Base</td>
                <td>30 dias</td>
                <td>${salario.toFixed(2).replace('.', ',')}</td>
                <td></td>
            </tr>
            <tr>
                <td>INSS</td>
                <td>${inss.ref}</td>
                <td></td>
                <td>${inss.valor.toFixed(2).replace('.', ',')}</td>
            </tr>
            <tr>
                <td>IRRF</td>
                <td>${irrf.ref}</td>
                <td></td>
                <td>${irrf.valor.toFixed(2).replace('.', ',')}</td>
            </tr>
        `;

        document.getElementById('hTotalProv').textContent = totalProventos.toFixed(2).replace('.', ',');
        document.getElementById('hTotalDesc').textContent = totalDescontos.toFixed(2).replace('.', ',');
        document.getElementById('hLiquido').textContent = liquido.toFixed(2).replace('.', ',');

        // Mostra o holerite
        document.getElementById('holeritePronto').style.display = 'block';
    }
</script>

</body>
</html>
