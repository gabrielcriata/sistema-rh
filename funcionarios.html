<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH - Funcionários</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #09090b; --bg-card: #18181b; --border-color: #27272a;
            --text-main: #f4f4f5; --text-muted: #a1a1aa;
            --accent-purple: #8b5cf6; --accent-red: #ef4444; --accent-green: #10b981;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); padding: 24px; margin: 0; -webkit-font-smoothing: antialiased;}
        .container { background-color: var(--bg-card); padding: 32px; border-radius: 16px; border: 1px solid var(--border-color); max-width: 900px; margin: auto; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { color: var(--text-main); border-bottom: 1px solid var(--border-color); padding-bottom: 16px; margin-top: 0; font-weight: 600; font-size: 20px;}
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: 1 / -1; }
        
        label { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;}
        input { width: 100%; padding: 12px; background: #09090b; border: 1px solid var(--border-color); color: var(--text-main); border-radius: 8px; box-sizing: border-box; font-size: 14px; font-family: 'Inter', sans-serif; transition: 0.3s; }
        input:focus { border-color: var(--accent-purple); outline: none; box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2); }
        
        button, .btn-salvar { padding: 12px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; color: #fff; font-size: 14px; background-color: var(--accent-purple); width: 100%; font-family: 'Inter', sans-serif;}
        button:hover { background-color: #7c3aed; transform: translateY(-1px); }
        .btn-excluir { background-color: transparent; border: 1px solid var(--accent-red); color: var(--accent-red); padding: 6px 12px; font-size: 12px; width: auto; margin-top:0;}
        .btn-excluir:hover { background: rgba(239, 68, 68, 0.1); }

        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 24px; font-size: 13px; border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
        th, td { padding: 16px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background-color: rgba(255,255,255,0.02); color: var(--text-muted); text-transform: uppercase; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: rgba(255,255,255,0.02); }
    </style>
</head>
<body>

<div class="container">
    <h2>Cadastro de Funcionários</h2>
    
    <div class="form-grid">
        <input type="hidden" id="funcId">
        <div class="form-group full-width">
            <label>Nome Completo:</label>
            <input type="text" id="nome" placeholder="Digite o nome...">
        </div>
        <div class="form-group">
            <label>Cargo / Função:</label>
            <input type="text" id="cargo" placeholder="Ex: Assistente Administrativo">
        </div>
        <div class="form-group">
            <label>Salário Bruto (R$):</label>
            <input type="number" id="salario" step="0.01" placeholder="Ex: 2500.00">
        </div>
        <div class="form-group">
            <label>Dependentes (IRRF):</label>
            <input type="number" id="dependentes" value="0" min="0">
        </div>
        <div class="form-group">
            <label>Data de Admissão:</label>
            <input type="date" id="admissao">
        </div>
        <div class="form-group full-width">
            <label>CPF:</label>
            <input type="text" id="cpf" placeholder="000.000.000-00">
        </div>
    </div>

    <button class="btn-salvar" onclick="salvarFuncionario()">Salvar Registro</button>

    <h2 style="margin-top: 40px;">Quadro de Funcionários</h2>
    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Cargo</th>
                <th>Admissão</th>
                <th>Salário</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="listaFuncionarios"></tbody>
    </table>
</div>

<script>
    document.addEventListener("DOMContentLoaded", renderizarTabela);

    function salvarFuncionario() {
        const id = document.getElementById('funcId').value || Date.now();
        const nome = document.getElementById('nome').value;
        const cargo = document.getElementById('cargo').value;
        const salario = parseFloat(document.getElementById('salario').value);
        const dependentes = parseInt(document.getElementById('dependentes').value) || 0;
        const admissao = document.getElementById('admissao').value;
        const cpf = document.getElementById('cpf').value;

        if (!nome || !salario || !admissao) {
            alert("Nome, Salário e Data de Admissão são obrigatórios!"); return;
        }

        const funcionario = { id, nome, cargo, salario, dependentes, admissao, cpf };
        let funcionarios = JSON.parse(localStorage.getItem('rhFuncionarios')) || [];

        const index = funcionarios.findIndex(f => f.id == id);
        if (index > -1) { funcionarios[index] = funcionario; } 
        else { funcionarios.push(funcionario); }

        localStorage.setItem('rhFuncionarios', JSON.stringify(funcionarios));
        limparFormulario();
        renderizarTabela();
    }

    function renderizarTabela() {
        const tbody = document.getElementById('listaFuncionarios');
        tbody.innerHTML = '';
        const funcionarios = JSON.parse(localStorage.getItem('rhFuncionarios')) || [];

        funcionarios.forEach(f => {
            const dataFormato = f.admissao ? f.admissao.split('-').reverse().join('/') : '-';
            let salarioFormatado = "0,00";
            if (!isNaN(parseFloat(f.salario))) { salarioFormatado = parseFloat(f.salario).toFixed(2).replace('.', ','); }

            tbody.innerHTML += `
                <tr>
                    <td><strong>${f.nome}</strong><br><small style="color:var(--text-muted)">${f.cpf || ''}</small></td>
                    <td>${f.cargo || '-'}</td>
                    <td>${dataFormato}</td>
                    <td style="color: var(--accent-green); font-weight: 600;">R$ ${salarioFormatado}</td>
                    <td>
                        <button class="btn-excluir" onclick="excluirFuncionario(${f.id})">Excluir</button>
                    </td>
                </tr>
            `;
        });
    }

    function excluirFuncionario(id) {
        if (confirm("Tem certeza que deseja demitir/excluir este funcionário?")) {
            let funcionarios = JSON.parse(localStorage.getItem('rhFuncionarios')) || [];
            funcionarios = funcionarios.filter(f => f.id != id);
            localStorage.setItem('rhFuncionarios', JSON.stringify(funcionarios));
            renderizarTabela();
        }
    }

    function limparFormulario() {
        document.getElementById('funcId').value = '';
        document.getElementById('nome').value = '';
        document.getElementById('cargo').value = '';
        document.getElementById('salario').value = '';
        document.getElementById('dependentes').value = '0';
        document.getElementById('admissao').value = '';
        document.getElementById('cpf').value = '';
    }
</script>
</body>
</html>
