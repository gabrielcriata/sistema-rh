<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH - Gestão de Funcionários</title>
    <style>
        :root {
    --bg-body: #0d0e15;
    --bg-card: #151623;
    --text-main: #ffffff;
    --text-muted: #8b8d9b;
    --accent-purple: #8a2be2;
    --accent-green: #2ecc71;
    --accent-red: #ff4757;
    --border-color: #232533;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: var(--bg-body); /* Fundo igual ao do painel */
    color: var(--text-main);
    padding: 20px;
    margin: 0;
}

/* Container Principal (Cards) */
.container, .card {
    background-color: var(--bg-card);
    padding: 30px;
    border-radius: 12px;
    border: 1px solid var(--border-color);
    max-width: 900px;
    margin: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h2 { color: var(--text-main); border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-top: 0; font-weight: 600; }
h3 { color: var(--text-main); margin-top: 25px; font-weight: 500; font-size: 16px; }

/* Formulários e Inputs */
.form-grid, .grid-geral, .controles { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
.form-group { display: flex; flex-direction: column; }
.form-group.full-width { grid-column: 1 / -1; }

.controles { display: flex; gap: 10px; } /* Especial para tela de holerite */
.controles select { flex-grow: 1; }

label { font-size: 12px; color: var(--text-muted); font-weight: bold; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;}

input, select {
    width: 100%; padding: 12px; background: #0a0b10;
    border: 1px solid var(--border-color); color: var(--text-main);
    border-radius: 8px; box-sizing: border-box; font-size: 14px; transition: 0.3s;
}

input:focus, select:focus { border-color: var(--accent-purple); outline: none; box-shadow: 0 0 0 2px rgba(138, 43, 226, 0.2); }
input.tabela-input { text-align: center; padding: 8px; }

/* Botões */
button, .btn-salvar, .btn-acao {
    padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; color: #fff; font-size: 14px;
}
.btn-salvar, button { background-color: var(--accent-purple); width: 100%; margin-top: 10px;}
.btn-salvar:hover, button:hover { background-color: #7122b8; transform: translateY(-1px); }

.btn-editar { background-color: transparent; border: 1px solid var(--accent-purple); color: var(--accent-purple); padding: 6px 12px; font-size: 12px; }
.btn-editar:hover { background: rgba(138, 43, 226, 0.1); }
.btn-excluir { background-color: transparent; border: 1px solid var(--accent-red); color: var(--accent-red); padding: 6px 12px; font-size: 12px; }
.btn-excluir:hover { background: rgba(255, 71, 87, 0.1); }

/* Tabelas (Quadro de Funcionários e Configurações) */
table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 15px; font-size: 14px; border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; }
th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border-color); }
th { background-color: rgba(255,255,255,0.02); color: var(--text-muted); text-transform: uppercase; font-size: 11px; font-weight: bold; letter-spacing: 1px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background-color: rgba(255,255,255,0.02); }

/* Mensagens de Sucesso */
.msg-sucesso, .mensagem { background-color: rgba(46, 204, 113, 0.1); color: var(--accent-green); border: 1px solid rgba(46, 204, 113, 0.2); padding: 12px; border-radius: 8px; text-align: center; margin-top: 20px; font-weight: bold; }

/* Especial: Holerite Visual (Folha de Papel) */
.holerite-box { background: #fff; color: #111; border-radius: 4px; padding: 30px; margin-top: 30px; display: none; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
.holerite-box h3 { color: #111; border-bottom: 2px solid #111; margin-top: 0; text-align: center;}
.holerite-box table { border: 2px solid #111; border-radius: 0; }
.holerite-box th { background-color: #f0f0f0; color: #111; border: 1px solid #111; text-align: center; }
.holerite-box td { border: 1px solid #111; padding: 8px; text-align: right; color: #111;}
.holerite-box td:nth-child(1) { text-align: left; }
.totais { display: flex; justify-content: space-between; font-weight: bold; font-size: 16px; margin-top: 10px; border-top: 2px solid #111; padding-top: 10px; }
.valor-liquido { color: #27ae60; font-size: 18px; }

/* Impressão */
@media print {
    body { background: white; padding: 0; }
    .controles, h2, .container { box-shadow: none; padding: 0; background: transparent; border: none;}
    .holerite-box { display: block; border: none; box-shadow: none; padding: 0; margin: 0; }
    h2, .controles { display: none; }
}
    </style>
</head>
<body>

<div class="container">
    <h2>Cadastro de Funcionários</h2>
    
    <input type="hidden" id="editandoId">
    
    <div class="form-grid">
        <div class="form-group full-width">
            <label>Nome Completo:</label>
            <input type="text" id="nome" placeholder="Ex: João da Silva">
        </div>
        <div class="form-group">
            <label>CPF:</label>
            <input type="text" id="cpf" placeholder="000.000.000-00">
        </div>
        <div class="form-group">
            <label>Cargo:</label>
            <input type="text" id="cargo" placeholder="Ex: Desenvolvedor">
        </div>
        <div class="form-group">
            <label>Data de Admissão:</label>
            <input type="date" id="admissao">
        </div>
        <div class="form-group">
            <label>Salário Base (R$):</label>
            <input type="number" id="salario" step="0.01" placeholder="Ex: 3500.00">
        </div>
        <div class="form-group">
            <label>Qtd. Dependentes (IRRF):</label>
            <input type="number" id="dependentes" value="0" min="0">
        </div>
    </div>

    <button class="btn-acao btn-salvar" onclick="salvarFuncionario()">Salvar Funcionário</button>

    <h2>Quadro de Equipe</h2>
    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Cargo</th>
                <th>Admissão</th>
                <th>Salário Base</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="listaFuncionarios">
            </tbody>
    </table>
</div>

<script>
    document.addEventListener("DOMContentLoaded", renderizarLista);

    function salvarFuncionario() {
        const idEditando = document.getElementById('editandoId').value;
        
        const funcionario = {
            id: idEditando ? parseInt(idEditando) : Date.now(), // Usa o ID existente ou cria um novo
            nome: document.getElementById('nome').value,
            cpf: document.getElementById('cpf').value,
            cargo: document.getElementById('cargo').value,
            admissao: document.getElementById('admissao').value,
            salario: parseFloat(document.getElementById('salario').value),
            dependentes: parseInt(document.getElementById('dependentes').value) || 0
        };

        if (!funcionario.nome || !funcionario.salario) {
            alert("Nome e Salário são obrigatórios!");
            return;
        }

        let funcionarios = JSON.parse(localStorage.getItem('rhFuncionarios')) || [];

        if (idEditando) {
            // Atualiza funcionário existente
            const index = funcionarios.findIndex(f => f.id === funcionario.id);
            funcionarios[index] = funcionario;
            document.getElementById('editandoId').value = ""; // Limpa estado de edição
        } else {
            // Adiciona novo funcionário
            funcionarios.push(funcionario);
        }

        localStorage.setItem('rhFuncionarios', JSON.stringify(funcionarios));
        limparFormulario();
        renderizarLista();
    }

    function renderizarLista() {
        const tbody = document.getElementById('listaFuncionarios');
        tbody.innerHTML = '';
        const funcionarios = JSON.parse(localStorage.getItem('rhFuncionarios')) || [];

        funcionarios.forEach(f => {
            // Formata a data para padrão BR
            const dataFormatada = f.admissao ? f.admissao.split('-').reverse().join('/') : '-';
            
            tbody.innerHTML += `
                <tr>
                    <td>${f.nome}<br><small style="color: #7f8c8d;">CPF: ${f.cpf}</small></td>
                    <td>${f.cargo}</td>
                    <td>${dataFormatada}</td>
                    <td>R$ ${f.salario.toFixed(2).replace('.', ',')}</td>
                    <td>
                        <button class="btn-acao btn-editar" onclick="editarFuncionario(${f.id})">Editar</button>
                        <button class="btn-acao btn-excluir" onclick="excluirFuncionario(${f.id})">Excluir</button>
                    </td>
                </tr>
            `;
        });
    }

    function editarFuncionario(id) {
        const funcionarios = JSON.parse(localStorage.getItem('rhFuncionarios')) || [];
        const funcionario = funcionarios.find(f => f.id === id);

        if (funcionario) {
            document.getElementById('editandoId').value = funcionario.id;
            document.getElementById('nome').value = funcionario.nome;
            document.getElementById('cpf').value = funcionario.cpf || '';
            document.getElementById('cargo').value = funcionario.cargo || '';
            document.getElementById('admissao').value = funcionario.admissao || '';
            document.getElementById('salario').value = funcionario.salario;
            document.getElementById('dependentes').value = funcionario.dependentes || 0;
            
            // Rola a página para o formulário
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function excluirFuncionario(id) {
        if (confirm("Tem certeza que deseja excluir este funcionário? Esta ação não pode ser desfeita.")) {
            let funcionarios = JSON.parse(localStorage.getItem('rhFuncionarios')) || [];
            funcionarios = funcionarios.filter(f => f.id !== id);
            localStorage.setItem('rhFuncionarios', JSON.stringify(funcionarios));
            renderizarLista();
        }
    }

    function limparFormulario() {
        document.getElementById('editandoId').value = '';
        document.getElementById('nome').value = '';
        document.getElementById('cpf').value = '';
        document.getElementById('cargo').value = '';
        document.getElementById('admissao').value = '';
        document.getElementById('salario').value = '';
        document.getElementById('dependentes').value = '0';
    }
</script>

</body>
</html>
